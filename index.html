
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Story</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Baloo 2',cursive;
}

body{
background:#ffe3f0;
min-height:100vh;
overflow-x:hidden;
}

/* DOODLES */

.doodle{
position:absolute;
font-size:28px;
opacity:0.6;
animation:float 6s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* LOGIN */

#loginPage{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(135deg,#ff9ac7,#ffc2dd);
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.login-box{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
text-align:center;
width:300px;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ddd;
}

/* BUTTON */

button{
padding:12px 25px;
background:#ff4f81;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin-top:10px;
}

/* PAPER */

.paper{
background:
linear-gradient(#e9e9e9 1px, transparent 1px),
linear-gradient(90deg,#e9e9e9 1px, transparent 1px);
background-size:40px 40px;
background-color:white;
max-width:1000px;
margin:auto;
margin-top:40px;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

/* HERO */

.hero{
text-align:center;
margin-bottom:30px;
}

.hero h1{
font-size:48px;
color:#ff4f81;
}

/* QUESTIONS */

#questions{
display:none;
text-align:center;
}

.option{
background:#ffd9ec;
padding:12px;
margin:12px auto;
width:220px;
border-radius:10px;
cursor:pointer;
}

.option:hover{
transform:scale(1.05);
background:#ffc3de;
}

/* SCRAPBOOK */

#scrapbook{
display:none;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.note{
background:#fff2a8;
padding:12px;
border-radius:8px;
margin-top:10px;
}

.photo img{
width:100%;
border-radius:4px;
}

/* PUZZLE */

#puzzlePage{
display:none;
text-align:center;
}

#puzzle-board{
width:360px;
height:480px;
margin:30px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(4,1fr);
gap:6px;
}

.piece{
background-image:url("poster1.jpeg");
background-size:360px 480px;
border-radius:8px;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

.piece:hover{
transform:scale(1.05);
}

/* FINAL */

#final{
display:none;
text-align:center;
}

.cake{
font-size:100px;
margin-top:20px;
cursor:pointer;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<div class="login-box">

<h2>Secret Memory Login</h2>

<input placeholder="Username">
<input type="password" placeholder="Password">

<button onclick="enterSite()">Enter</button>

</div>

</div>

<audio id="bgMusic" loop>
<source src="JumpAroundMode.mp3" type="audio/mpeg">
</audio>

<div class="paper">

<!-- HOME -->

<div id="home">

<div class="hero">
<h1>Our Story</h1>
<p>Start the memory journey</p>
</div>

<button onclick="startStory()">Start</button>

</div>

<!-- QUESTIONS -->

<div id="questions">

<h2 id="questionText"></h2>

<div id="answers"></div>

</div>

<!-- SCRAPBOOK -->

<div id="scrapbook">

<div class="hero">
<h1>These Are For You</h1>
</div>

<div class="grid">

<div class="card">
<h2>Music</h2>
<div class="note">A special song for you 🎵</div>
</div>

<div class="card">
<h2>Photos</h2>
<div class="photo">
<img src="https://picsum.photos/300/200">
</div>
</div>

<div class="card">
<h2>Letter</h2>
<div class="note">
Happy Birthday ❤️  
You make every day brighter.
</div>
</div>

<div class="card">
<h2>Memories</h2>
<div class="photo">
<img src="https://picsum.photos/300/201">
</div>
</div>

</div>

<button onclick="openPuzzle()">Continue</button>

</div>

<!-- PUZZLE -->

<div id="puzzlePage">

<h2>Complete the puzzle to unlock your surprise ❤️</h2>

<div id="puzzle-board"></div>

<button onclick="startPuzzle()">Shuffle Puzzle</button>

</div>

<!-- FINAL -->

<div id="final">

<h1>Happy Birthday ❤️</h1>

<p>Click the cake</p>

<div class="cake">🎂</div>

</div>

</div>

<script>

/* LOGIN */

function enterSite(){

document.getElementById("loginPage").style.display="none";

let music=document.getElementById("bgMusic");

music.volume=0.4;
music.play();

}

/* QUESTIONS */

let questions=[

{q:"Where did we first meet?",a:["School","Instagram","Cafe","Mall"],correct:1},
{q:"Who said I love you first?",a:["Me","You"],correct:0},
{q:"Our favorite place?",a:["Cafe","Beach","Mall"],correct:1},
{q:"What do we enjoy doing together?",a:["Movies","Travel","Gaming"],correct:0},
{q:"What day is today?",a:["Holiday","Your Birthday","Random"],correct:1}

];

let current=0;

function startStory(){

document.getElementById("home").style.display="none";
document.getElementById("questions").style.display="block";

loadQuestion();

}

function loadQuestion(){

let q=questions[current];

document.getElementById("questionText").innerText=q.q;

let html="";

q.a.forEach((ans,i)=>{
html+=`<div class="option" onclick="check(${i})">${ans}</div>`;
});

document.getElementById("answers").innerHTML=html;

}

function check(i){

if(i===questions[current].correct){

current++;

if(current<questions.length){

loadQuestion();

}else{

document.getElementById("questions").style.display="none";
document.getElementById("scrapbook").style.display="block";

}

}else{

alert("Oops! Try again 😄");

}

}

/* PUZZLE */

function openPuzzle(){

document.getElementById("scrapbook").style.display="none";
document.getElementById("puzzlePage").style.display="block";

}

const board=document.getElementById("puzzle-board");

let pieces=[];

const rows=4;
const cols=3;

function startPuzzle(){

board.innerHTML="";
pieces=[];

for(let i=0;i<rows*cols;i++){

let piece=document.createElement("div");

piece.className="piece";

let x=i%cols;
let y=Math.floor(i/cols);

piece.style.backgroundPosition=`-${x*120}px -${y*120}px`;

pieces.push(piece);

}

pieces.sort(()=>Math.random()-0.5);

pieces.forEach(p=>{
board.appendChild(p);
});

let first=null;

document.querySelectorAll(".piece").forEach(piece=>{

piece.addEventListener("click",()=>{

if(!first){

first=piece;
piece.style.outline="3px solid #ff4f81";

}else{

let temp=first.style.backgroundPosition;

first.style.backgroundPosition=piece.style.backgroundPosition;
piece.style.backgroundPosition=temp;

first.style.outline="none";
first=null;

checkWin();

}

});

});

}

function checkWin(){

let correct=true;

document.querySelectorAll(".piece").forEach((p,i)=>{

let x=i%cols;
let y=Math.floor(i/cols);

let pos=`-${x*120}px -${y*120}px`;

if(p.style.backgroundPosition!==pos){
correct=false;
}

});

if(correct){

setTimeout(()=>{

alert("Puzzle Completed 🎉");

document.getElementById("puzzlePage").style.display="none";
showFinal();

},300);

}

}

/* FINAL */

function showFinal(){

document.getElementById("final").style.display="block";

}

</script>

</body>
</html>
