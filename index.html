<!DOCTYPE html>
<html>

<head>
<title>Member Login</title>
</head>

<body>

<h2>Member Login</h2>

<p>Please sign in to continue</p>

Username:<br>
<input type="text" id="user">
<br><br>

Password:<br>
<input type="password" id="pass">
<br><br>

<button onclick="login()">Sign In</button>

<div id="surprise" style="display:none; margin-top:40px;">

<h2>Happy Birthday</h2>

<p>This was not actually a login page.</p>

<p>I just made this small page for you.</p>

<p>Hope you have a great birthday.</p>

</div>

<script>

function login(){

let password="1234"

let input=document.getElementById("pass").value

if(input===password){

document.getElementById("surprise").style.display="block"

}

else{

alert("Incorrect password")

}

}

</script>

</body>

</html>
