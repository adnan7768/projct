
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lovely Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Fredoka',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#f3d6ff,#e8c5ff,#f7e4ff);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* FLOATING HEARTS */

.heart{
position:absolute;
color:#ff7ab6;
font-size:20px;
animation:float 6s infinite linear;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* MAIN CARD */

.container{
width:850px;
background:rgba(255,255,255,0.75);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
box-shadow:0 25px 40px rgba(0,0,0,0.2);
text-align:center;
}

/* TITLE */

.title{
font-size:36px;
color:#9b59b6;
margin-bottom:10px;
}

.subtitle{
color:#777;
margin-bottom:40px;
}

/* CARDS */

.cards{
display:flex;
justify-content:center;
gap:30px;
}

.card{
width:160px;
height:140px;
background:linear-gradient(135deg,#d8a8f2,#c18ae6);
border-radius:20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
font-size:20px;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card:hover{
transform:translateY(-8px) scale(1.05);
}

/* BIRTHDAY */

.birthday{
margin-top:40px;
}

.cake{
font-size:90px;
cursor:pointer;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#c18ae6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#a86bd8;
}

</style>
</head>

<body>

<!-- FLOATING HEARTS -->

<div class="heart" style="left:10%">❤</div>
<div class="heart" style="left:25%">❤</div>
<div class="heart" style="left:40%">❤</div>
<div class="heart" style="left:55%">❤</div>
<div class="heart" style="left:70%">❤</div>
<div class="heart" style="left:85%">❤</div>

<div class="container">

<div class="title">💜 THESE ARE FOR YOU 💜</div>
<div class="subtitle">Click a memory</div>

<div class="cards">

<div class="card">
🎵
Music
</div>

<div class="card">
📷
Photos
</div>

<div class="card">
💌
Letter
</div>

</div>

<div class="birthday">

<h2 style="color:#9b59b6;margin-top:30px;">
Happy Birthday ❤️
</h2>

<p>Click the cake for your surprise</p>

<div class="cake">🎂</div>

<button>Open Surprise</button>

</div>

</div>

</body>
</html>
```
