<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise ❤️</title>

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff4b6e,#ff758c,#ff7eb3,#ff9a9e);
background-size:400% 400%;
animation:bg 10s ease infinite;
color:white;
text-align:center;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:500px;
padding:20px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff4b6e;
font-size:18px;
cursor:pointer;
margin-top:20px;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

.hidden{
display:none;
}

.gallery{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
}

.gallery img{
width:120px;
border-radius:10px;
}

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

</style>

</head>

<body>

<div class="container">

<h1>🎂 Happy Birthday ❤️</h1>

<p>
Even though we are far apart,  
I made something special just for you.
</p>

<button onclick="openSurprise()">Open Your Surprise</button>

<div id="surprise" class="hidden">

<h2>💖 Our Memories</h2>

<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
</div>

<h2>💌 My Message</h2>

<p>
You are the most beautiful part of my life.  
Distance doesn't change what you mean to me.  

Happy Birthday ❤️
</p>

</div>

</div>

<script>

function openSurprise(){
document.getElementById("surprise").style.display="block"
}

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

}

setInterval(createHeart,300)

</script>

</body>
</html>
