```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Demo</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Fredoka',sans-serif;
background:#EED7F7;
text-align:center;
}

/* LOGIN */

#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

button{
padding:10px 20px;
border:none;
background:#B784C9;
color:white;
border-radius:6px;
cursor:pointer;
}

/* QUESTION PAGE */

#questionPage{
display:none;
padding-top:100px;
}

.option{
margin:10px auto;
padding:10px;
width:200px;
background:#CFA3D9;
border-radius:10px;
cursor:pointer;
}

/* CARDS */

#cardsPage{
display:none;
padding:40px;
}

.cards{
display:flex;
justify-content:center;
gap:30px;
}

.card{
width:150px;
height:120px;
background:#CFA3D9;
border-radius:15px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:20px;
}

/* BIRTHDAY */

#birthdayPage{
display:none;
padding-top:100px;
}

.cake{
font-size:80px;
cursor:pointer;
}

</style>

</head>
<body>

<!-- LOGIN -->

<div id="login">

<div class="box">

<h2>Login</h2>

<button onclick="start()">Enter</button>

</div>

</div>

<!-- QUESTION -->

<div id="questionPage">

<h2 id="question"></h2>

<div id="answers"></div>

</div>

<!-- CARDS -->

<div id="cardsPage">

<h2>♥ THESE ARE FOR YOU ♥</h2>

<div class="cards">

<div class="card">🎵 Music</div>
<div class="card">📷 Photos</div>
<div class="card">💌 Letter</div>

</div>

<br>

<button onclick="showBirthday()">Next</button>

</div>

<!-- BIRTHDAY -->

<div id="birthdayPage">

<h1>Happy Birthday ❤️</h1>

<p>Click the cake</p>

<div class="cake">🎂</div>

</div>

<script>

let questions=[
{
q:"Where did we meet?",
a:["School","Instagram","Cafe"],
correct:1
},
{
q:"Who said I love you first?",
a:["Me","You"],
correct:0
},
{
q:"What day is today?",
a:["Holiday","Your Birthday","Random"],
correct:1
}
];

let current=0;

function start(){

document.getElementById("login").style.display="none";
document.getElementById("questionPage").style.display="block";

showQuestion();

}

function showQuestion(){

let q=questions[current];

document.getElementById("question").innerText=q.q;

let html="";

for(let i=0;i<q.a.length;i++){

html+=`<div class="option" onclick="check(${i})">${q.a[i]}</div>`;

}

document.getElementById("answers").innerHTML=html;

}

function check(i){

if(i===questions[current].correct){

current++;

if(current<questions.length){

showQuestion();

}else{

document.getElementById("questionPage").style.display="none";
document.getElementById("cardsPage").style.display="block";

}

}else{

alert("Try again 😄");

}

}

function showBirthday(){

document.getElementById("cardsPage").style.display="none";
document.getElementById("birthdayPage").style.display="block";

}

</script>

</body>
</html>
```
